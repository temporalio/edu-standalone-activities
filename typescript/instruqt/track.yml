title: Build a Job Queue with Standalone Activities (TypeScript)
teaser: Build a durable webhook-delivery service with Standalone Activities, Temporal's
  durable job queue. No broker, no scheduler, no retry library to operate.
description: |
  Standalone Activities are Temporal's durable job queue. Submit jobs as top-level
  Activities with one API call. They are persisted, retried on failure, and addressable
  in the UI. No broker or scheduler to operate. The same Activity code runs inside
  a Workflow later when the job grows into multi-step work. You'll build a durable
  webhook delivery service across six modules covering crash safety, deduplication,
  rate limits, heartbeats, and the Activity-in-Workflow upgrade path.
