<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacing a fan-out with max_activities_per_second</title>
<style>
  * { box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e2e8f0;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0.7em 1em 0.9em;
  }
  h1 { text-align: center; margin: 0 0 0.1em 0; font-size: 1.15em; font-weight: 600; }
  .subtitle { text-align: center; color: #a0aec0; margin-bottom: 0.6em; font-size: 0.84em; }

  /* Prominent rate-cap control: the knob the learner is watching. */
  .capbar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6em;
    max-width: 760px;
    margin: 0 auto 0.6em;
    padding: 0.45em 0.8em;
    background: #16213a;
    border: 1px solid #2d3748;
    border-radius: 8px;
    font-size: 0.95em;
  }
  .capbar .lbl { color: #cbd5e0; font-weight: 600; }
  .capval {
    font-family: ui-monospace, 'SF Mono', monospace;
    font-weight: 800;
    font-size: 1.05em;
    padding: 0.2em 0.8em;
    border-radius: 999px;
    transition: background 0.3s, color 0.3s, box-shadow 0.3s;
  }
  .capval.off { background: #742a2a; color: #fed7d7; }
  .capval.on  { background: #22543d; color: #c6f6d5; box-shadow: 0 0 12px rgba(72,187,120,0.45); }

  .step {
    text-align: center;
    color: #b794f6;
    font-size: 0.9em;
    margin: 0 auto 0.55em;
    max-width: 820px;
    min-height: 2.5em;
    line-height: 1.4;
  }
  .step code { color: #d6bcfa; font-family: ui-monospace, 'SF Mono', monospace; font-size: 0.92em; }

  .stage { position: relative; max-width: 820px; height: 188px; margin: 0 auto; }
  .col-label {
    position: absolute; top: 0; transform: translateX(-50%);
    font-size: 0.72em; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.03em; color: #a0aec0;
  }
  .zone { position: absolute; top: 22px; bottom: 6px; border: 1.5px dashed #4a5568; border-radius: 6px; }
  .zone.queue { left: 1%; width: 31%; }
  .zone.worker { left: 38%; width: 22%; border-color: #444ce7; }
  .zone.receiver { left: 66%; width: 33%; border-color: #38a169; }
  .worker-name { position: absolute; left: 49%; top: 50%; transform: translate(-50%,-50%); color: #9fa8f5; font-weight: 600; font-size: 0.85em; }

  .recv-meta { position: absolute; left: 82.5%; top: 50%; transform: translate(-50%,-50%); text-align: center; width: 28%; }
  .recv-meta .delivered { font-family: ui-monospace, monospace; font-weight: 800; font-size: 1.25em; color: #9ae6b4; }
  .recv-meta .lbl { font-size: 0.62em; text-transform: uppercase; color: #a0aec0; letter-spacing: 0.03em; }
  .lamp {
    display: inline-block; margin-top: 0.5em; padding: 0.18em 0.55em; border-radius: 4px;
    font-size: 0.72em; font-weight: 700; font-family: ui-monospace, monospace;
    background: #2d3748; color: #718096; transition: background 0.25s, color 0.25s, box-shadow 0.25s;
  }
  .lamp.hot { background: #e53e3e; color: #fff; box-shadow: 0 0 12px rgba(229,62,62,0.6); }

  .dot {
    position: absolute; width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid #1a1a2e; background: #4299e1;
    transition: left 0.55s cubic-bezier(0.45,0,0.35,1), top 0.55s cubic-bezier(0.45,0,0.35,1), background 0.3s;
    z-index: 2;
  }
  .dot.delivered { background: #48bb78; }
  .dot.rejected { background: #fc8181; }

  /* Legend: large and easy to read. */
  .legend {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4em 1.4em;
    max-width: 760px; margin: 0.55em auto 0;
    padding: 0.5em 0.8em; background: #16213a; border: 1px solid #2d3748; border-radius: 8px;
    font-size: 0.9em; color: #cbd5e0;
  }
  .legend .item { display: flex; align-items: center; gap: 0.45em; }
  .legend .sw { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #1a1a2e; }
  .sw.bg { background: #4299e1; } .sw.delivered { background: #48bb78; } .sw.rejected { background: #fc8181; }

  .controls { text-align: center; margin-top: 0.6em; }
  button {
    background: #444ce7; color: white; border: none; border-radius: 4px;
    padding: 0.4em 0.9em; margin: 0 0.2em; font-size: 0.85em; font-family: inherit;
    cursor: pointer; transition: background 0.15s;
  }
  button:hover:not(:disabled) { background: #5a61f0; }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  .progress { display: flex; justify-content: center; gap: 5px; margin-top: 0.5em; }
  .progress-pip { width: 7px; height: 7px; background: #4a5568; border-radius: 50%; transition: background 0.2s; }
  .progress-pip.active { background: #b794f6; }
</style>
</head>
<body>
<h1>Pacing a fan-out with <code>max_activities_per_second</code></h1>
<div class="subtitle">A batch hits the queue. Flip the Worker's rate cap and watch what the receiver does.</div>

<div class="capbar">
  <span class="lbl">Worker rate cap</span>
  <span class="capval off" id="capval">off</span>
</div>

<div class="step" id="step-desc"></div>

<div class="stage" id="stage">
  <div class="col-label" style="left:16.5%">Task Queue</div>
  <div class="col-label" style="left:49%">Worker</div>
  <div class="col-label" style="left:82.5%">Receiver</div>
  <div class="zone queue"></div>
  <div class="zone worker"></div>
  <div class="zone receiver"></div>
  <div class="worker-name">Worker</div>
  <div class="recv-meta">
    <div class="delivered"><span id="delivered">0</span> / 12</div>
    <div class="lbl">delivered (200 OK)</div>
    <div class="lamp" id="lamp">429</div>
  </div>
</div>

<div class="legend">
  <span class="item"><span class="sw bg"></span> queued job</span>
  <span class="item"><span class="sw delivered"></span> delivered (200 OK)</span>
  <span class="item"><span class="sw rejected"></span> 429, retrying</span>
</div>

<div class="controls">
  <button id="btn-prev">⏮ Back</button>
  <button id="btn-step">⏭ Step</button>
  <button id="btn-play">▶ Play</button>
  <button id="btn-reset">⟲ Reset</button>
  <div class="progress" id="progress"></div>
</div>

<script>
  const N = 12;
  const $ = (id) => document.getElementById(id);
  const stage = $('stage');

  const dots = [];
  for (let i = 0; i < N; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    stage.appendChild(d);
    dots.push(d);
  }

  const ROWS_TOP = [34, 72, 110, 148];
  const Q_COLS = [7, 15, 23];
  const R_COLS = [72, 80, 88];
  const GATE_LEFT = 48;

  const qPos = (i) => ({ left: Q_COLS[i % 3], top: ROWS_TOP[Math.floor(i / 3)] });
  const rPos = (p) => ({ left: R_COLS[p % 3], top: ROWS_TOP[Math.floor(p / 3)] });

  function place(d, leftPct, topPx, delay = 0) {
    d.style.transitionDelay = delay + 's';
    d.style.left = leftPct + '%';
    d.style.top = topPx + 'px';
  }
  function setCap(on) {
    const el = $('capval');
    el.textContent = on ? '2 / sec' : 'off';
    el.className = 'capval ' + (on ? 'on' : 'off');
  }
  function setDelivered(n) { $('delivered').textContent = n; }
  function setLamp(hot) { $('lamp').classList.toggle('hot', hot); }

  function fillQueue() {
    dots.forEach((d, i) => {
      d.className = 'dot';
      const p = qPos(i);
      place(d, p.left, p.top, 0);
    });
  }
  function dispatchPaced() {
    dots.forEach((d, p) => {
      const pos = rPos(p);
      d.classList.add('delivered'); d.classList.remove('rejected');
      place(d, pos.left, pos.top, p * 0.4);
    });
  }
  function flood(landCount) {
    dots.forEach((d, i) => {
      if (i < landCount) {
        const pos = rPos(i);
        d.classList.add('delivered'); d.classList.remove('rejected');
        place(d, pos.left, pos.top, 0);
      } else {
        d.classList.add('rejected'); d.classList.remove('delivered');
        place(d, GATE_LEFT + ((i % 3) - 1) * 4, ROWS_TOP[(i - landCount) % 4], 0);
      }
    });
  }

  const steps = [
    {
      desc: 'A batch of webhook deliveries is queued. The downstream receiver accepts about <b>2 requests/sec</b>. Press <b>Step</b> or <b>Play</b>.',
      apply: () => { setCap(false); fillQueue(); setDelivered(0); setLamp(false); }
    },
    {
      desc: 'With the rate cap <b>off</b>, the Worker fires the whole batch at once. The receiver takes only ~2/sec, so the rest come back as <code>429 Too Many Requests</code> and retry, hammering the downstream.',
      apply: () => { setCap(false); flood(2); setDelivered(2); setLamp(true); }
    },
    {
      desc: 'Flip the cap on: <code>max_activities_per_second=2</code>, matched to what the downstream can take. Excess work waits durably in the Task Queue.',
      apply: () => { setCap(true); fillQueue(); setDelivered(0); setLamp(false); }
    },
    {
      desc: 'Now dispatch is paced at <b>2/sec</b>. Every delivery lands cleanly (<code>200 OK</code>) and the receiver is never flooded. No <code>429</code> storm.',
      apply: () => { setCap(true); dispatchPaced(); setDelivered(12); setLamp(false); }
    },
    {
      desc: 'Same work, same outcome. <code>max_activities_per_second</code> just paces how fast the Worker dispatches, so a big fan-out never overwhelms the receiver.',
      apply: () => { setCap(true); }
    }
  ];

  let current = 0, playing = false, playTimer = null;
  const STEP_INTERVAL_MS = 3000;

  function renderProgress() {
    const wrap = $('progress');
    wrap.innerHTML = '';
    steps.forEach((_, i) => {
      const p = document.createElement('div');
      p.className = 'progress-pip' + (i === current ? ' active' : '');
      wrap.appendChild(p);
    });
  }
  function setStep(i) {
    current = Math.max(0, Math.min(steps.length - 1, i));
    $('step-desc').innerHTML = steps[current].desc;
    steps[current].apply();
    $('btn-step').disabled = current >= steps.length - 1;
    $('btn-prev').disabled = current <= 0;
    renderProgress();
  }
  function play() {
    playing = true;
    $('btn-play').textContent = '⏸ Pause';
    if (current >= steps.length - 1) setStep(0);
    playTimer = setInterval(() => {
      if (current < steps.length - 1) setStep(current + 1);
      else stopPlay();
    }, STEP_INTERVAL_MS);
  }
  function stopPlay() {
    playing = false;
    $('btn-play').textContent = '▶ Play';
    if (playTimer) { clearInterval(playTimer); playTimer = null; }
  }
  $('btn-step').onclick = () => { stopPlay(); setStep(current + 1); };
  $('btn-prev').onclick = () => { stopPlay(); setStep(current - 1); };
  $('btn-reset').onclick = () => { stopPlay(); setStep(0); };
  $('btn-play').onclick = () => { playing ? stopPlay() : play(); };

  setStep(0);
</script>
</body>
</html>
