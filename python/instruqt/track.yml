  loadingMessages:
  - Standalone Activities are Temporal's durable job queue.
  - Same @activity.defn code. Standalone today, Workflow step tomorrow.
  - 5 SDKs. 1 action per job. 0 infrastructure to manage.
  - Jobs persist before acknowledgment. Survive deploys, crashes, restarts.
  - Declarative retries. No retry library to wire up per service.
  - Every job is addressable. UI, CLI, SDK, API.
  - client.start_activity returns a handle. Cancel, terminate, describe.
  - Standalone Activities support RetryPolicy, timeouts, heartbeats.
  - temporal activity list shows every Standalone Activity, in flight or done.
  - Pause a running Activity with temporal activity pause. Resume later.
  - Same Worker hosts Standalone Activities and Workflows alike.
  - Activity IDs are the dedup key Temporal already gives you for free.
  - Server-driven retries. Your client can disconnect; the Activity finishes.
  - 'Module 02: crash the Worker. Without idempotency, you double-deliver.'
  - 'Module 03: same job ID submitted twice? Temporal returns the existing one.'
  - 'Module 04: cap your Worker''s rate so a fan-out doesn''t DDoS the receiver.'
  - 'Module 05: long-running jobs heartbeat progress and resume after a crash.'
  - 'Module 06: same Activity called from a Workflow. Same code, two job types.'
  - Booting your sandbox. Reading the manual is overrated.
  - Spinning up a webhook receiver. It will receive whatever you POST at it.
