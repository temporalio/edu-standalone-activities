  loadingMessages:
  - Same activity, 3 events vs 11. That's the standalone story.
  - Standalone Activities are up to 50% cheaper than the same work in a workflow.
  - 'Workflow history: 11 events. Standalone activity: 3. Same delivery.'
  - The same @activity.defn from a workflow runs as a Standalone Activity.
  - 'Server-driven retries: your client can disconnect, the activity still finishes.'
  - No @workflow.defn required. client.execute_activity is the whole API.
  - Standalone Activities support RetryPolicy, timeouts, and heartbeats.
  - temporal activity list shows every Standalone Activity, in flight or done.
  - 'Three state transitions: Scheduled, Started, Completed. That''s the lifecycle.'
  - No workflow history means no retention overhead. That's the cost win.
  - Pause a running activity with temporal activity pause. Resume it later.
  - Same worker hosts Standalone and workflow-bound activities alike.
  - 'Module 02: crash the worker. Without idempotency, you double-deliver.'
  - 'Module 03: cap your worker''s rate so you don''t DDoS your own customers.'
  - 'Module 04: same event scheduled twice? Temporal rejects the duplicate.'
  - Activity IDs are the dedup key Temporal already gives you for free.
  - Booting your sandbox. Reading the manual is overrated.
  - Spinning up an webhook receiver. It will receive whatever you POST at it.
  - Provisioning a Python that doesn't time out. Or get lost. Or duplicate.
