title: Standalone Activities as a Durable Job Queue (Python)
teaser: Build a durable webhook-delivery job with a Standalone Activity, and see how
  it costs less than wrapping the same work in a workflow.
description: |
  Standalone Activities give you Temporal's durability, retries, and visibility
  for one-shot jobs without writing a workflow. You'll build a webhook delivery
  job, run it standalone and via a workflow, and compare the cost of each shape.
