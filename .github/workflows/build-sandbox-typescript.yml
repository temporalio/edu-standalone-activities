name: Build TypeScript sandbox image

# Builds the Instruqt sandbox image used by the TypeScript standalone-activities
# track and pushes it to GitHub Container Registry.
#
# Triggers on changes to the Dockerfile or to the pre-cloned course repo, since
# course-repo is COPY'd into the image at build time. Also runnable on demand.
# Includes add-typescript-track so the image rebuilds while the track is still
# in development, before it is merged to main.

on:
  push:
    branches:
      - main
      - add-typescript-track
    paths:
      - 'typescript/sandbox/**'
      - 'typescript/course-repo/**'
      - '.github/workflows/build-sandbox-typescript.yml'
  pull_request:
    paths:
      - 'typescript/sandbox/**'
      - 'typescript/course-repo/**'
      - '.github/workflows/build-sandbox-typescript.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/temporalio/edu-standalone-activities-sandbox

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only log in for events that should publish. PRs build but don't push.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push, if not a PR)
        uses: docker/build-push-action@v6
        with:
          # Context is typescript/ so the Dockerfile's `COPY course-repo/` resolves.
          context: typescript
          file: typescript/sandbox/Dockerfile
          # Instruqt sandboxes run linux/amd64. Pin explicitly so this matches
          # regardless of who triggers the build or what host arch they're on.
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE }}:typescript-latest
            ${{ env.IMAGE }}:typescript-${{ github.sha }}
          cache-from: type=gha,scope=typescript-sandbox
          cache-to: type=gha,scope=typescript-sandbox,mode=max
